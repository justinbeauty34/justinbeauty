name: Update Google Reviews

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-reviews:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Google reviews
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          PLACE_ID: ChIJ7dMx8IsNsRIRG1jVbga9JWI
        run: node update-reviews.js

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Update reviews $(date '+%Y-%m-%d')"
          git push
