name: Mise à jour automatique des avis Google

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-reviews:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Récupérer le code du site
        uses: actions/checkout@v4

      - name: Installer Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Récupérer les avis Google et mettre à jour index.html
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          PLACE_ID: ChIJ7dMx8IsNsRIRG1jVbga9JWI
        run: node update-reviews.js

      - name: Publier les modifications sur GitHub
        run: |
          git config user.name "JustIn Beauty Bot"
          git config user.email "bot@justinbeauty-institut.fr"
          git add index.html
          git diff --staged --quiet || git commit -m "Avis Google mis a jour - $(date '+%d/%m/%Y')"
          git push
